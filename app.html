<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>RAVEN App</title>
<meta name="theme-color" content="#06060A">
<link rel="icon" type="image/png" href="icon-1024.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Epilogue:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--black:#06060A;--panel:#101018;--panel2:#171724;--line:rgba(255,255,255,.1);--line2:rgba(255,255,255,.16);--white:#F5F1FF;--muted:#9B97AA;--soft:#D9C4FF;--purple:#A855F7;--violet:#C084FC;--green:#30D158;--blue:#58C7FF;--orange:#FFB86B;--red:#FF6B6B}
html,body{min-height:100%;font-family:Epilogue,system-ui,sans-serif;background:var(--black);color:var(--white);overflow-x:hidden}
body{min-height:100vh;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);background:radial-gradient(circle at 20% -10%,rgba(168,85,247,.25),transparent 34%),radial-gradient(circle at 100% 10%,rgba(48,209,88,.14),transparent 30%),linear-gradient(180deg,#06060A 0%,#0A0A12 100%)}
button,input{font:inherit}
.intro-splash{position:fixed;inset:0;z-index:50;display:grid;place-items:center;background:radial-gradient(circle at 50% 42%,rgba(168,85,247,.28),transparent 34%),#06060A;animation:splashOut .9s .9s ease forwards}
.intro-r{width:min(58vw,260px);aspect-ratio:1;border-radius:34%;display:grid;place-items:center;position:relative;background:linear-gradient(145deg,#151522,#07070D);border:1px solid rgba(255,255,255,.14);box-shadow:0 0 90px rgba(168,85,247,.34);animation:rPop .82s cubic-bezier(.2,1.25,.32,1) both}
.intro-r::before{content:"R";font-family:"Bebas Neue";font-size:min(44vw,210px);line-height:.8;background:linear-gradient(180deg,#F1DCFF 4%,#B276FF 92%);-webkit-background-clip:text;color:transparent}
.intro-r::after{content:"";position:absolute;width:23%;aspect-ratio:1;border-radius:50%;bottom:9%;background:var(--green);box-shadow:0 0 34px rgba(48,209,88,.75)}
.app-shell{min-height:100vh;display:flex;flex-direction:column;padding:8px 18px 18px;position:relative;isolation:isolate}
.app-shell::before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:42px 42px;mask-image:linear-gradient(#000 0%,transparent 72%);pointer-events:none;z-index:-2}
.topbar{display:flex;align-items:center;justify-content:center;margin-bottom:0;min-height:24px}
.brand{display:flex;align-items:center;gap:10px}
.mini-mark{display:none}
.mini-mark span{font-family:"Bebas Neue";font-size:27px;line-height:1;background:linear-gradient(180deg,#F3E8FF,#B878FF);-webkit-background-clip:text;color:transparent}
.brand-name{font-family:"Bebas Neue";font-size:22px;letter-spacing:.16em;line-height:1;color:rgba(245,241,255,.82)}
.brand-status{display:none}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 16px rgba(48,209,88,.8)}
.hero{display:grid;place-items:center;text-align:center;padding:0 0 10px}
.raven-stage{position:relative;width:min(34vw,158px);aspect-ratio:1;margin:-4px auto 2px;display:grid;place-items:center;filter:drop-shadow(0 22px 40px rgba(0,0,0,.35))}
.raven-glow{position:absolute;inset:12%;border-radius:50%;background:radial-gradient(circle,rgba(168,85,247,.28),rgba(48,209,88,.12) 45%,transparent 70%);animation:breathe 3.5s ease-in-out infinite}
.raven-wing{position:absolute;width:45%;height:30%;top:32%;background:linear-gradient(135deg,rgba(192,132,252,.95),rgba(137,92,246,.78));clip-path:polygon(0 45%,58% 0,100% 18%,68% 45%,100% 77%,58% 100%);opacity:.8}
.raven-wing.left{left:0;transform-origin:100% 50%;animation:wingLeft 2.25s ease-in-out infinite}
.raven-wing.right{right:0;transform:scaleX(-1);transform-origin:0 50%;animation:wingRight 2.25s ease-in-out infinite}
.raven-core{position:relative;width:58%;height:58%;border-radius:31%;background:linear-gradient(145deg,#14141F,#07070D);border:1px solid rgba(255,255,255,.12);display:grid;place-items:center;box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 20px 70px rgba(124,58,237,.24)}
.raven-core::after{content:"";position:absolute;width:22%;aspect-ratio:1;border-radius:50%;bottom:9%;background:var(--green);box-shadow:0 0 24px rgba(48,209,88,.56)}
.raven-r{font-family:"Bebas Neue";font-size:clamp(56px,15vw,92px);line-height:.8;background:linear-gradient(180deg,#F0D8FF 5%,#B276FF 92%);-webkit-background-clip:text;color:transparent;margin-top:-4px}
.spark{position:absolute;width:8px;height:8px;border-radius:50%;background:var(--green);opacity:.72;animation:floatSpark 4s ease-in-out infinite}
.spark.s1{left:18%;top:18%}.spark.s2{right:20%;top:22%;background:var(--blue);animation-delay:.55s}.spark.s3{left:28%;bottom:14%;background:var(--violet);animation-delay:1s}
.hero h1{font-family:"Bebas Neue";font-size:clamp(42px,13vw,68px);letter-spacing:.04em;line-height:.88;margin-top:0}
.hero p{max-width:320px;margin:7px auto 0;color:var(--muted);font-size:13px;line-height:1.45}
.quick-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:4px 0 12px}
.quick-card{min-height:72px;border:1px solid var(--line);border-radius:18px;background:linear-gradient(180deg,rgba(255,255,255,.065),rgba(255,255,255,.025));padding:10px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:0 16px 36px rgba(0,0,0,.18);animation:popIn .55s ease both}
.quick-card:nth-child(2){animation-delay:.08s}.quick-card:nth-child(3){animation-delay:.16s}
.icon-bubble{width:34px;height:34px;border-radius:13px;display:grid;place-items:center;background:rgba(48,209,88,.12);border:1px solid rgba(48,209,88,.25);color:var(--green)}
.quick-card:nth-child(2) .icon-bubble{background:rgba(168,85,247,.14);border-color:rgba(168,85,247,.28);color:var(--violet)}
.quick-card:nth-child(3) .icon-bubble{background:rgba(88,199,255,.12);border-color:rgba(88,199,255,.26);color:var(--blue)}
.icon-bubble svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.quick-label{font-size:11px;font-weight:800;line-height:1.25;color:var(--white)}
.auth-card{background:rgba(16,16,24,.88);border:1px solid var(--line2);border-radius:24px;padding:16px;box-shadow:0 26px 70px rgba(0,0,0,.35);backdrop-filter:blur(18px)}
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:6px;background:rgba(255,255,255,.05);padding:5px;border-radius:16px;margin-bottom:16px}
.tab{border:0;border-radius:12px;background:transparent;color:var(--muted);font-size:13px;font-weight:800;padding:11px;cursor:pointer}
.tab.active{background:var(--white);color:#090910;box-shadow:0 8px 20px rgba(0,0,0,.22)}
.form{display:none;gap:12px}.form.active{display:grid}
.field{display:grid;gap:6px}
.label{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.input{width:100%;border:1px solid var(--line);border-radius:14px;background:#0B0B12;color:var(--white);padding:14px 15px;outline:none}
.input:focus{border-color:rgba(192,132,252,.75);box-shadow:0 0 0 4px rgba(168,85,247,.14)}
.primary-btn{width:100%;border:0;border-radius:15px;background:var(--green);color:#06100A;padding:15px 16px;font-weight:900;cursor:pointer;box-shadow:0 14px 28px rgba(48,209,88,.24)}
.primary-btn:disabled{opacity:.62;cursor:wait}
.secondary-btn{width:100%;border:1px solid var(--line);border-radius:15px;background:rgba(255,255,255,.045);color:var(--white);padding:13px 16px;font-weight:800;cursor:pointer}
.row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.tiny{font-size:12px;color:var(--muted);line-height:1.5}
.link-btn{border:0;background:transparent;color:var(--soft);font-size:12px;font-weight:800;cursor:pointer}
.error,.success{display:none;border-radius:14px;padding:11px 12px;font-size:13px;line-height:1.45;margin-bottom:12px}
.error{background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.25);color:#FFB3B3}
.success{background:rgba(48,209,88,.1);border:1px solid rgba(48,209,88,.24);color:#A7F3B7}
.loading{position:fixed;inset:0;background:rgba(6,6,10,.84);display:none;place-items:center;z-index:20;backdrop-filter:blur(14px)}
.loading.show{display:grid}
.loader-mark{width:82px;height:82px;border-radius:28px;background:linear-gradient(145deg,#151522,#08080E);border:1px solid var(--line2);display:grid;place-items:center;animation:loaderPulse 1.2s ease-in-out infinite}
.loader-mark span{font-family:"Bebas Neue";font-size:60px;background:linear-gradient(#F0D8FF,#B276FF);-webkit-background-clip:text;color:transparent}
@keyframes breathe{0%,100%{transform:scale(.94);opacity:.7}50%{transform:scale(1.08);opacity:1}}
@keyframes wingLeft{0%,100%{transform:rotate(-7deg) translateY(0)}50%{transform:rotate(13deg) translateY(-8px)}}
@keyframes wingRight{0%,100%{transform:scaleX(-1) rotate(-7deg) translateY(0)}50%{transform:scaleX(-1) rotate(13deg) translateY(-8px)}}
@keyframes floatSpark{0%,100%{transform:translateY(0) scale(.8);opacity:.45}50%{transform:translateY(-18px) scale(1.15);opacity:1}}
@keyframes popIn{from{transform:translateY(12px) scale(.96);opacity:0}to{transform:none;opacity:1}}
@keyframes loaderPulse{0%,100%{transform:scale(1);box-shadow:0 0 0 rgba(168,85,247,0)}50%{transform:scale(1.04);box-shadow:0 0 42px rgba(168,85,247,.32)}}
@keyframes rPop{0%{transform:scale(.36) rotate(-8deg);opacity:0}64%{transform:scale(1.12) rotate(2deg);opacity:1}100%{transform:scale(1) rotate(0)}}
@keyframes splashOut{to{opacity:0;visibility:hidden;pointer-events:none}}
@media(max-height:760px){.app-shell{padding-top:4px}.topbar{display:none}.raven-stage{width:min(30vw,130px)}.hero h1{font-size:40px}.hero p{display:none}.quick-row{margin-top:0}.quick-card{min-height:64px}.auth-card{padding:14px}.form{gap:10px}.input{padding:12px 14px}.primary-btn{padding:13px 14px}}
@media(min-width:760px){.app-shell{max-width:460px;margin:0 auto}.raven-stage{width:240px}}
</style>
</head>
<body>
<div class="intro-splash" id="intro-splash" aria-hidden="true"><div class="intro-r"></div></div>
<div class="app-shell">
  <header class="topbar">
    <div class="brand">
      <div class="mini-mark"><span>R</span></div>
      <div>
        <div class="brand-name">RAVEN</div>
      </div>
    </div>
  </header>

  <section class="hero" aria-label="RAVEN app welcome">
    <div class="raven-stage" aria-hidden="true">
      <div class="raven-glow"></div>
      <div class="spark s1"></div>
      <div class="spark s2"></div>
      <div class="spark s3"></div>
      <div class="raven-wing left"></div>
      <div class="raven-wing right"></div>
      <div class="raven-core"><div class="raven-r">R</div></div>
    </div>
    <h1>Split Smarter</h1>
    <p>Open RAVEN, scan the receipt, and keep the group moving.</p>
  </section>

  <div class="quick-row" aria-label="Quick actions">
    <div class="quick-card">
      <div class="icon-bubble"><svg viewBox="0 0 24 24"><path d="M7 3h10l2 4v14H5V7l2-4Z"/><path d="M8 11h8M8 15h5"/></svg></div>
      <div class="quick-label">Scan receipts</div>
    </div>
    <div class="quick-card">
      <div class="icon-bubble"><svg viewBox="0 0 24 24"><path d="M16 11a4 4 0 1 0-8 0"/><path d="M3 21a7 7 0 0 1 18 0"/><path d="M18 8h3M19.5 6.5v3"/></svg></div>
      <div class="quick-label">Add friends</div>
    </div>
    <div class="quick-card">
      <div class="icon-bubble"><svg viewBox="0 0 24 24"><path d="M4 17h16"/><path d="M7 17V7M12 17V4M17 17v-6"/></svg></div>
      <div class="quick-label">Track paid</div>
    </div>
  </div>

  <main class="auth-card">
    <div class="tabs">
      <button class="tab active" id="login-tab" type="button" onclick="showTab('login')">Sign in</button>
      <button class="tab" id="signup-tab" type="button" onclick="showTab('signup')">Create</button>
    </div>
    <div class="error" id="message-error"></div>
    <div class="success" id="message-success"></div>

    <form class="form active" id="login-form" onsubmit="handleLogin(event)">
      <label class="field">
        <span class="label">Email</span>
        <input class="input" id="login-email" type="email" autocomplete="email" placeholder="you@example.com" required>
      </label>
      <label class="field">
        <span class="label">Password</span>
        <input class="input" id="login-password" type="password" autocomplete="current-password" placeholder="Password" required>
      </label>
      <div class="row">
        <label class="tiny"><input id="remember-email" type="checkbox" style="accent-color:var(--green);vertical-align:-2px"> Remember email</label>
        <button class="link-btn" type="button" onclick="showTab('reset')">Forgot?</button>
      </div>
      <button class="primary-btn" id="login-button" type="submit">Sign in to RAVEN</button>
    </form>

    <form class="form" id="signup-form" onsubmit="handleSignup(event)">
      <label class="field">
        <span class="label">First name</span>
        <input class="input" id="signup-first" type="text" autocomplete="given-name" placeholder="First name" required>
      </label>
      <label class="field">
        <span class="label">Email</span>
        <input class="input" id="signup-email" type="email" autocomplete="email" placeholder="you@example.com" required>
      </label>
      <label class="field">
        <span class="label">Password</span>
        <input class="input" id="signup-password" type="password" autocomplete="new-password" placeholder="At least 6 characters" required>
      </label>
      <button class="primary-btn" id="signup-button" type="submit">Create account</button>
      <p class="tiny">You will finish setup in the app after email confirmation.</p>
    </form>

    <form class="form" id="reset-form" onsubmit="handleReset(event)">
      <label class="field">
        <span class="label">Email</span>
        <input class="input" id="reset-email" type="email" autocomplete="email" placeholder="you@example.com" required>
      </label>
      <button class="primary-btn" id="reset-button" type="submit">Send reset link</button>
      <button class="secondary-btn" type="button" onclick="showTab('login')">Back to sign in</button>
    </form>
  </main>
</div>

<div class="loading" id="loading"><div class="loader-mark"><span>R</span></div></div>

<script>
const SUPABASE_URL = 'https://ffjpzkpdumdcwnakpaje.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmanB6a3BkdW1kY3duYWtwYWplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5ODc4OTcsImV4cCI6MjA4ODU2Mzg5N30.JtDLVu4K1TJ8emcN_mvSHBu6e0y8-jPQv-ypoc9p0RU';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function el(id){return document.getElementById(id)}
function showLoading(show){el('loading').classList.toggle('show', !!show)}
function showMessage(type, text){
  el('message-error').style.display = 'none';
  el('message-success').style.display = 'none';
  const box = el(type === 'success' ? 'message-success' : 'message-error');
  box.textContent = text;
  box.style.display = 'block';
}
function clearMessage(){el('message-error').style.display='none';el('message-success').style.display='none'}
function showTab(tab){
  clearMessage();
  ['login','signup','reset'].forEach(name => {
    const form = el(name + '-form');
    if (form) form.classList.toggle('active', name === tab);
  });
  el('login-tab').classList.toggle('active', tab === 'login' || tab === 'reset');
  el('signup-tab').classList.toggle('active', tab === 'signup');
  if (tab === 'reset') {
    const known = el('login-email').value || localStorage.getItem('raven_remembered_email') || '';
    el('reset-email').value = known;
  }
}
function sanitizeRavenBase(base){
  return (String(base || '').trim().split(/\s+/)[0] || '').toLowerCase().replace(/[^a-z0-9_]/g,'').slice(0,16) || 'raven';
}
async function generateUniqueRavenId(base, excludeUserId){
  const clean = sanitizeRavenBase(base);
  for (let i = 0; i < 40; i++) {
    const candidate = (clean + String(Math.floor(Math.random() * 900) + 100)).slice(0,20);
    let query = db.from('profiles').select('id').eq('raven_id', candidate);
    if (excludeUserId) query = query.neq('id', excludeUserId);
    const { data } = await query.maybeSingle();
    if (!data) return candidate;
  }
  return (clean + Date.now().toString().slice(-3)).slice(0,20);
}
async function routeAfterAuth(user){
  showLoading(true);
  try {
    const { data: profile } = await db.from('profiles').select('onboarding_complete,first_name,raven_id,username').eq('id', user.id).maybeSingle();
    if (profile?.onboarding_complete) {
      localStorage.setItem('raven_profile', JSON.stringify({
        user_id: user.id,
        email: user.email,
        first_name: profile.first_name || '',
        raven_id: profile.raven_id || profile.username || '',
        username: profile.username || profile.raven_id || '',
        onboarding_complete: true
      }));
      window.location.href = 'dashboard.html';
      return;
    }
    window.location.href = 'onboarding.html';
  } catch(e) {
    window.location.href = 'dashboard.html';
  }
}
async function handleLogin(event){
  event.preventDefault();
  clearMessage();
  const email = el('login-email').value.trim();
  const password = el('login-password').value;
  const btn = el('login-button');
  btn.disabled = true;
  btn.textContent = 'Signing in...';
  const { data, error } = await db.auth.signInWithPassword({ email, password });
  btn.disabled = false;
  btn.textContent = 'Sign in to RAVEN';
  if (error) return showMessage('error', error.message);
  if (el('remember-email').checked) localStorage.setItem('raven_remembered_email', email);
  else localStorage.removeItem('raven_remembered_email');
  if (data?.user) routeAfterAuth(data.user);
}
async function handleSignup(event){
  event.preventDefault();
  clearMessage();
  const first = el('signup-first').value.trim();
  const email = el('signup-email').value.trim();
  const password = el('signup-password').value;
  if (password.length < 6) return showMessage('error','Password must be at least 6 characters.');
  const btn = el('signup-button');
  btn.disabled = true;
  btn.textContent = 'Creating...';
  let ravenId = '';
  try { ravenId = await generateUniqueRavenId(first || 'raven'); } catch(e) {}
  const { data, error } = await db.auth.signUp({
    email,
    password,
    options: { data: { first_name: first, raven_id: ravenId, username: ravenId } }
  });
  if (error) {
    btn.disabled = false;
    btn.textContent = 'Create account';
    return showMessage('error', error.message);
  }
  if (data?.user) {
    try {
      await db.from('profiles').upsert({
        id: data.user.id,
        email,
        first_name: first,
        raven_id: ravenId || await generateUniqueRavenId(first || 'raven', data.user.id),
        username: ravenId,
        onboarding_complete: false,
        updated_at: new Date().toISOString()
      }, { onConflict: 'id' });
    } catch(e) {}
  }
  btn.disabled = false;
  btn.textContent = 'Create account';
  if (data?.session?.user) {
    routeAfterAuth(data.session.user);
    return;
  }
  showTab('login');
  el('login-email').value = email;
  showMessage('success','Account created. Check your email to confirm, then sign in here.');
}
async function handleReset(event){
  event.preventDefault();
  clearMessage();
  const email = el('reset-email').value.trim();
  const btn = el('reset-button');
  btn.disabled = true;
  btn.textContent = 'Sending...';
  const redirectTo = window.location.origin + window.location.pathname;
  const { error } = await db.auth.resetPasswordForEmail(email, { redirectTo });
  btn.disabled = false;
  btn.textContent = 'Send reset link';
  if (error) return showMessage('error', error.message);
  showMessage('success','Reset link sent. Check your inbox.');
}
(async function init(){
  localStorage.setItem('raven_native_app','1');
  const remembered = localStorage.getItem('raven_remembered_email') || '';
  if (remembered) {
    el('login-email').value = remembered;
    el('remember-email').checked = true;
  }
  const hash = window.location.hash;
  if (hash && hash.includes('access_token')) {
    try { await db.auth.getSession(); history.replaceState(null, '', window.location.pathname); } catch(e) {}
  }
  const { data: { session } } = await db.auth.getSession();
  if (session?.user) routeAfterAuth(session.user);
})();
</script>
</body>
</html>
