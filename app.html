<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>RAVEN App</title>
<meta name="theme-color" content="#06060A">
<link rel="icon" type="image/png" href="icon-1024.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Epilogue:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#06060A;--panel:#101018;--panel2:#171724;
  --line:rgba(255,255,255,.08);--line2:rgba(255,255,255,.14);
  --white:#F5F1FF;--muted:#8A86A0;--soft:#D9C4FF;
  --purple:#A855F7;--violet:#C084FC;--green:#30D158;--blue:#58C7FF;--orange:#FFB86B;--red:#FF6B6B;
  --card-bg:linear-gradient(160deg,rgba(22,22,36,.95),rgba(10,10,18,.98));
}
html,body{height:100%;min-height:100%;font-family:Epilogue,system-ui,sans-serif;background:var(--black);color:var(--white);overflow:hidden}
body{min-height:100vh;padding:0;
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%,rgba(168,85,247,.22),transparent),
    radial-gradient(ellipse 60% 40% at 100% 60%,rgba(48,209,88,.10),transparent),
    #06060A;
  opacity:0;transform:translateY(8px);transition:opacity .25s ease,transform .25s ease}
body.ready{opacity:1;transform:none}
body.leaving{opacity:0;transform:translateY(8px)}
button,input,textarea{font:inherit}

/* ── SPLASH ── */
.intro-splash{position:fixed;inset:0;z-index:50;display:grid;place-items:center;
  background:radial-gradient(ellipse 80% 60% at 50% 40%,rgba(168,85,247,.22),transparent 60%),#06060A;
  animation:splashOut .8s 1s ease forwards}
.intro-r{width:min(52vw,240px);aspect-ratio:1;border-radius:32%;display:grid;place-items:center;position:relative;
  background:linear-gradient(145deg,#18182A,#08080E);
  border:1px solid rgba(255,255,255,.12);
  box-shadow:0 0 80px rgba(168,85,247,.3),0 0 0 1px rgba(168,85,247,.08) inset;
  animation:rPop .75s cubic-bezier(.2,1.2,.32,1) both}
.intro-r::before{content:"R";font-family:"Bebas Neue";font-size:min(40vw,190px);line-height:.82;
  background:linear-gradient(175deg,#F8EEFF 10%,#C276FF 88%);-webkit-background-clip:text;color:transparent}
.intro-r::after{content:"";position:absolute;width:20%;aspect-ratio:1;border-radius:50%;bottom:10%;
  background:var(--green);box-shadow:0 0 28px rgba(48,209,88,.8)}

/* ── LOGIN SHELL ── */
.app-shell{min-height:100vh;display:flex;flex-direction:column;padding:env(safe-area-inset-top,0px) 0 0;position:relative;isolation:isolate;overflow:hidden auto}
.app-shell-inner{padding:16px 20px 24px;display:flex;flex-direction:column;flex:1;gap:0}
.app-shell::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:-1;
  background-image:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);
  background-size:48px 48px;mask-image:linear-gradient(#000 0%,transparent 65%)}

.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.brand{display:flex;align-items:center;gap:10px}
.brand-logo-mark{width:36px;height:36px;border-radius:12px;
  background:linear-gradient(145deg,#1C1C2E,#0A0A12);
  border:1px solid rgba(255,255,255,.12);display:grid;place-items:center;position:relative;
  box-shadow:0 8px 24px rgba(0,0,0,.3)}
.brand-logo-mark::before{content:"R";font-family:"Bebas Neue";font-size:28px;line-height:.8;
  background:linear-gradient(180deg,#F1DCFF,#B276FF);-webkit-background-clip:text;color:transparent}
.brand-logo-mark::after{content:"";position:absolute;width:7px;height:7px;border-radius:50%;
  background:var(--green);bottom:6px;right:9px;box-shadow:0 0 10px rgba(48,209,88,.8)}
.brand-name{font-family:"Bebas Neue";font-size:20px;letter-spacing:.18em;color:rgba(245,241,255,.9)}
.brand-tagline{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.08em}

/* ── HERO ── */
.hero{text-align:center;padding:8px 0 16px;display:flex;flex-direction:column;align-items:center}
.raven-stage{position:relative;width:min(38vw,168px);aspect-ratio:1;margin:0 auto 12px;display:grid;place-items:center}
.raven-glow{position:absolute;inset:0%;border-radius:50%;
  background:radial-gradient(circle,rgba(168,85,247,.2) 0%,rgba(48,209,88,.08) 55%,transparent 75%);
  animation:breathe 4s ease-in-out infinite}
.raven-ring{position:absolute;inset:-8%;border-radius:50%;
  border:1px dashed rgba(192,132,252,.22);animation:spin 20s linear infinite}
.raven-ring2{position:absolute;inset:-18%;border-radius:50%;
  border:1px solid rgba(48,209,88,.08);animation:spin 32s linear infinite reverse}
.raven-wing{position:absolute;width:42%;height:28%;top:34%;
  background:linear-gradient(135deg,rgba(192,132,252,.9),rgba(137,92,246,.7));
  clip-path:polygon(0 45%,58% 0,100% 18%,68% 45%,100% 77%,58% 100%);opacity:.75}
.raven-wing.left{left:0;transform-origin:100% 50%;animation:wingLeft 2.6s ease-in-out infinite}
.raven-wing.right{right:0;transform:scaleX(-1);transform-origin:0 50%;animation:wingRight 2.6s ease-in-out infinite}
.raven-core{position:relative;width:56%;height:56%;border-radius:28%;
  background:linear-gradient(145deg,#1A1A2C,#08080E);
  border:1px solid rgba(255,255,255,.10);display:grid;place-items:center;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 20px 60px rgba(124,58,237,.2)}
.raven-core::after{content:"";position:absolute;width:20%;aspect-ratio:1;border-radius:50%;
  bottom:9%;background:var(--green);box-shadow:0 0 20px rgba(48,209,88,.6)}
.raven-r{font-family:"Bebas Neue";font-size:clamp(52px,14vw,86px);line-height:.82;
  background:linear-gradient(175deg,#F0D8FF 5%,#B276FF 90%);-webkit-background-clip:text;color:transparent;margin-top:-2px}
.spark{position:absolute;width:6px;height:6px;border-radius:50%;background:var(--green);opacity:.6;animation:floatSpark 4.5s ease-in-out infinite}
.spark.s1{left:14%;top:16%}.spark.s2{right:16%;top:20%;background:var(--blue);animation-delay:.6s}.spark.s3{left:22%;bottom:16%;background:var(--violet);animation-delay:1.1s}
.hero-eyebrow{font-size:10px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;color:var(--green);margin-bottom:6px;opacity:.8}
.hero h1{font-family:"Bebas Neue";font-size:clamp(44px,14vw,72px);letter-spacing:.03em;line-height:.86;margin:0}
.hero p{max-width:280px;margin:8px auto 0;color:var(--muted);font-size:12.5px;line-height:1.5}

/* ── FEATURE CHIPS ── */
.feature-chips{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:10px 0 16px}
.chip{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:100px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
  font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap}
.chip svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.chip.g{color:var(--green);background:rgba(48,209,88,.07);border-color:rgba(48,209,88,.18)}
.chip.v{color:var(--violet);background:rgba(168,85,247,.08);border-color:rgba(168,85,247,.18)}
.chip.b{color:var(--blue);background:rgba(88,199,255,.07);border-color:rgba(88,199,255,.18)}

/* ── AUTH CARD ── */
.auth-card{background:rgba(14,14,22,.9);border:1px solid rgba(255,255,255,.1);border-radius:26px;padding:18px;
  box-shadow:0 30px 80px rgba(0,0,0,.4),0 0 0 1px rgba(168,85,247,.06) inset;backdrop-filter:blur(20px)}
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:5px;background:rgba(255,255,255,.04);padding:4px;border-radius:16px;margin-bottom:16px}
.tab{border:0;border-radius:12px;background:transparent;color:var(--muted);font-size:13px;font-weight:800;padding:11px;cursor:pointer;transition:all .15s ease}
.tab.active{background:rgba(255,255,255,.92);color:#090910;box-shadow:0 6px 18px rgba(0,0,0,.24)}
.form{display:none;gap:11px}.form.active{display:grid}
.field{display:grid;gap:5px}
.label{font-size:10px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.input{width:100%;border:1px solid rgba(255,255,255,.09);border-radius:13px;
  background:rgba(8,8,14,.9);color:var(--white);padding:13px 14px;outline:none;
  transition:border-color .15s,box-shadow .15s}
.input:focus{border-color:rgba(192,132,252,.65);box-shadow:0 0 0 3px rgba(168,85,247,.12)}
.primary-btn{width:100%;border:0;border-radius:14px;
  background:linear-gradient(180deg,#46F08C 0%,#30D158 60%,#25AE49 100%);
  color:#041208;padding:15px 16px;font-weight:900;font-size:14px;cursor:pointer;
  box-shadow:0 12px 28px rgba(48,209,88,.26),0 0 0 1px rgba(0,0,0,.15) inset;
  transition:transform .12s,filter .12s}
.primary-btn:hover{filter:brightness(1.06)}
.primary-btn:active{transform:scale(.99)}
.primary-btn:disabled{opacity:.6;cursor:wait}
.secondary-btn{width:100%;border:1px solid rgba(255,255,255,.09);border-radius:14px;
  background:rgba(255,255,255,.04);color:var(--white);padding:13px 16px;font-weight:800;cursor:pointer;
  transition:background .15s}
.secondary-btn:hover{background:rgba(255,255,255,.07)}
.google-btn{width:100%;border:1px solid rgba(255,255,255,.18);border-radius:14px;
  background:rgba(255,255,255,.96);color:#111;padding:13px 16px;font-weight:800;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;transition:opacity .15s}
.google-btn:hover{opacity:.92}
.google-btn svg{width:18px;height:18px;display:block}
.row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.tiny{font-size:11.5px;color:var(--muted);line-height:1.5}
.link-btn{border:0;background:transparent;color:var(--soft);font-size:12px;font-weight:800;cursor:pointer}
.error,.success{display:none;border-radius:13px;padding:11px 13px;font-size:12.5px;line-height:1.45;margin-bottom:10px}
.error{background:rgba(255,107,107,.08);border:1px solid rgba(255,107,107,.22);color:#FFB3B3}
.success{background:rgba(48,209,88,.08);border:1px solid rgba(48,209,88,.22);color:#A7F3B7}

/* ── APP HOME (signed-in scan screen) ── */
.app-home{display:none;height:100vh;height:100dvh;min-height:100vh;min-height:100dvh;overflow:hidden;
  background:
    radial-gradient(ellipse 90% 50% at 50% 0%,rgba(168,85,247,.22),transparent 55%),
    radial-gradient(ellipse 60% 40% at 20% 100%,rgba(48,209,88,.12),transparent 50%),
    linear-gradient(180deg,#07070D 0%,#0C0C16 100%);
  overscroll-behavior:none;touch-action:manipulation}
.app-home.active{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column}

/* top bar */
.home-top{display:none}
.home-brand{display:flex;align-items:center;gap:10px}
.home-logo{width:40px;height:40px;border-radius:14px;
  background:linear-gradient(145deg,#1C1C2E,#08080E);
  border:1px solid rgba(255,255,255,.12);display:grid;place-items:center;position:relative;
  box-shadow:0 10px 28px rgba(0,0,0,.3)}
.home-logo::before{content:"R";font-family:"Bebas Neue";font-size:32px;line-height:.82;
  background:linear-gradient(180deg,#F1DCFF,#B276FF);-webkit-background-clip:text;color:transparent}
.home-logo::after{content:"";position:absolute;width:7px;height:7px;border-radius:50%;
  background:var(--green);bottom:6px;right:9px;box-shadow:0 0 12px rgba(48,209,88,.8)}
.home-title{font-family:"Bebas Neue";font-size:28px;letter-spacing:.15em}
.home-sub{display:none}
.home-profile{display:none}

/* signed-out bottom bar */
.auth-actions{display:none;width:100%;gap:10px}
.app-home.signed-out .dashboard-pill{display:none}
.app-home.signed-out .auth-actions{display:flex}

/* scan section */
.scan-hero{flex:1;min-height:0;display:flex;align-items:stretch}
.scan-card{width:100%;height:100%;min-height:0;border:0;border-radius:0;background:transparent;box-shadow:none;
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
  padding:clamp(10px,2.5vh,26px) clamp(18px,6vw,32px) 10px;position:relative;overflow:hidden}
.scan-card::before{content:"";position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);
  background-size:44px 44px;mask-image:linear-gradient(#000 0%,transparent 75%);pointer-events:none}
.scan-card::after{content:"";position:absolute;inset:-40%;
  background:radial-gradient(circle at 42% 32%,rgba(48,209,88,.09),transparent 42%),radial-gradient(circle at 68% 62%,rgba(168,85,247,.12),transparent 46%);
  filter:blur(20px);opacity:.9;pointer-events:none;animation:scanGlow 7s ease-in-out infinite}
.scan-card{transform:translateZ(0)}

.scan-orbit{position:relative;width:clamp(148px,24vh,220px);aspect-ratio:1;border-radius:50%;display:grid;place-items:center;margin-bottom:clamp(12px,2.5vh,24px);flex:0 0 auto}
.scan-orbit::before{content:"";position:absolute;inset:0;border-radius:50%;border:1px dashed rgba(192,132,252,.28);animation:spin 18s linear infinite}
.scan-orbit::after{content:"";position:absolute;inset:-14%;border-radius:50%;border:1px solid rgba(48,209,88,.07);animation:spin 28s linear infinite reverse}
.scan-logo-button{width:58%;aspect-ratio:1;border:0;border-radius:28%;background:transparent;
  display:grid;place-items:center;padding:0;position:relative;cursor:pointer;
  touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.scan-mark{width:100%;height:100%;border-radius:28%;
  background:linear-gradient(148deg,#1C1C2E,#08080E);
  border:1px solid rgba(255,255,255,.12);display:grid;place-items:center;position:relative;
  box-shadow:0 20px 56px rgba(168,85,247,.24),0 0 0 1px rgba(168,85,247,.06) inset;
  transition:transform .14s ease,box-shadow .14s ease}
.scan-mark::before{content:"";position:absolute;inset:-28%;border-radius:50%;background:radial-gradient(circle,rgba(48,209,88,.12),transparent 62%);z-index:-1}
.scan-mark::after{content:"";position:absolute;width:16px;height:16px;border-radius:50%;background:var(--green);left:50%;bottom:10%;transform:translateX(-50%);box-shadow:0 0 22px rgba(48,209,88,.8)}
.scan-mark span{font-family:"Bebas Neue";font-size:min(27vw,124px);line-height:.82;background:linear-gradient(175deg,#F1DCFF,#B276FF);-webkit-background-clip:text;color:transparent}
.scan-logo-button:active .scan-mark{transform:scale(.97);box-shadow:0 14px 44px rgba(168,85,247,.2)}
.scan-logo-button:focus-visible{outline:none}
.scan-logo-button:focus-visible .scan-mark{box-shadow:0 20px 56px rgba(168,85,247,.26),0 0 0 4px rgba(48,209,88,.2)}
.scan-orbit,.scan-title,.scan-copy{position:relative;z-index:1}

/* scan title + instruction */
.scan-title{font-family:"Bebas Neue";font-size:clamp(46px,9.5vh,76px);letter-spacing:.03em;line-height:.88;margin-bottom:clamp(8px,1.4vh,14px);text-shadow:0 12px 36px rgba(0,0,0,.3);flex:0 0 auto}
.scan-copy{display:none}
.scan-instruction{position:relative;z-index:1;max-width:300px;margin-top:4px;color:rgba(245,241,255,.5);font-size:12px;line-height:1.5;flex:0 0 auto}
.scan-status-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:100px;
  background:rgba(48,209,88,.08);border:1px solid rgba(48,209,88,.18);
  font-size:11px;font-weight:700;color:var(--green);margin-top:12px;flex:0 0 auto;position:relative;z-index:1}
.scan-status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px rgba(48,209,88,.8);animation:breathe 2s ease-in-out infinite}

/* auth dock */
.app-auth-dock{position:relative;z-index:2;width:100%;max-width:360px;margin-top:10px;display:none;flex:0 1 auto;min-height:0}
.app-home.auth-visible .app-auth-dock{display:block}
.app-home.auth-visible .scan-orbit{width:clamp(108px,16vh,148px);margin-bottom:8px}
.app-home.auth-visible .scan-title{font-size:clamp(30px,5.5vh,44px);margin-bottom:6px}
.app-home.auth-visible .scan-copy,.app-home.auth-visible .scan-instruction,.app-home.auth-visible .scan-status-pill{display:none}
.app-home .auth-card{width:100%;max-height:none;overflow:visible;padding:12px;border-radius:20px}
.app-home .tabs{margin-bottom:10px}
.app-home .form{gap:9px}
.app-home .input{padding:11px 12px}
.app-home .primary-btn,.app-home .secondary-btn,.app-home .google-btn{padding:11px 12px}
.app-home .tiny{font-size:11px}

/* raven flight animation */
.raven-flight{position:fixed;inset:0;z-index:80;pointer-events:none;overflow:hidden}
.flight-raven{position:absolute;left:-64px;top:var(--fly-y);width:46px;height:26px;filter:drop-shadow(0 8px 14px rgba(0,0,0,.35));animation:ravenFly .62s cubic-bezier(.2,.74,.28,1) forwards}
.flight-raven::before,.flight-raven::after{content:"";position:absolute;top:6px;width:26px;height:16px;background:linear-gradient(135deg,#151522,#08080F);clip-path:polygon(0 55%,65% 0,100% 26%,72% 55%,100% 86%,65% 100%);animation:flyWing .18s ease-in-out infinite}
.flight-raven::before{left:0;transform-origin:100% 50%}
.flight-raven::after{right:0;transform:scaleX(-1);transform-origin:0 50%;animation-name:flyWingRight}
.flight-raven span{position:absolute;left:17px;top:5px;width:13px;height:13px;border-radius:50%;background:var(--green);box-shadow:0 0 16px rgba(48,209,88,.8)}

/* bottom CTA */
.app-cta-bottom{position:relative;z-index:3;flex:0 0 auto;width:100%;
  padding:10px 14px calc(10px + env(safe-area-inset-bottom));
  background:linear-gradient(180deg,rgba(7,7,13,.0),rgba(7,7,13,.98) 30%);
  box-shadow:none}
.dashboard-pill{display:flex;align-items:center;justify-content:center;width:100%;min-height:52px;
  padding:14px 18px;border:0;border-radius:18px;
  background:linear-gradient(180deg,#46F08C 0%,#30D158 60%,#25AE49 100%);
  font-size:15px;font-weight:900;color:#041208;
  box-shadow:0 12px 32px rgba(48,209,88,.28),0 0 0 1px rgba(0,0,0,.15) inset;
  cursor:pointer;transition:filter .12s,transform .12s;letter-spacing:.01em}
.dashboard-pill:hover{filter:brightness(1.06)}
.dashboard-pill:active{transform:scale(.99)}
.auth-action{min-height:48px;border:0;border-radius:15px;background:var(--green);color:#041208;
  font-size:13px;font-weight:900;cursor:pointer;flex:1;
  box-shadow:0 10px 24px rgba(48,209,88,.2);transition:filter .12s}
.auth-action.secondary{background:rgba(255,255,255,.07);color:var(--white);
  border:1px solid rgba(255,255,255,.12);box-shadow:none}

/* nav tabs */
.home-tabs{display:none !important}
.home-tabs.active{display:grid !important;grid-template-columns:repeat(4,1fr)}
.home-tab{border:0;background:transparent;color:var(--muted);display:grid;place-items:center;gap:4px;
  font-size:10.5px;font-weight:700;cursor:pointer;padding:8px 4px;border-radius:14px;
  transition:color .15s,background .15s}
.home-tab svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2.1;stroke-linecap:round;stroke-linejoin:round}
.home-tab.active{color:var(--green)}
.home-tab.active svg{filter:drop-shadow(0 0 6px rgba(48,209,88,.4))}

/* loading */
.loading{position:fixed;inset:0;background:rgba(6,6,10,.88);display:none;place-items:center;z-index:20;backdrop-filter:blur(16px)}
.loading.show{display:grid}
.loader-mark{width:80px;height:80px;border-radius:26px;background:linear-gradient(145deg,#1C1C2E,#08080E);
  border:1px solid rgba(255,255,255,.1);display:grid;place-items:center;
  animation:loaderPulse 1.3s ease-in-out infinite}
.loader-mark span{font-family:"Bebas Neue";font-size:58px;background:linear-gradient(#F0D8FF,#B276FF);-webkit-background-clip:text;color:transparent}

/* nav bar container */
#home-tabs-wrap{flex:0 0 auto;padding:6px 12px calc(6px + env(safe-area-inset-bottom));
  background:rgba(8,8,14,.94);border-top:1px solid rgba(255,255,255,.07);
  backdrop-filter:blur(20px)}

@keyframes breathe{0%,100%{transform:scale(.93);opacity:.65}50%{transform:scale(1.10);opacity:1}}
@keyframes wingLeft{0%,100%{transform:rotate(-8deg) translateY(0)}50%{transform:rotate(14deg) translateY(-9px)}}
@keyframes wingRight{0%,100%{transform:scaleX(-1) rotate(-8deg) translateY(0)}50%{transform:scaleX(-1) rotate(14deg) translateY(-9px)}}
@keyframes floatSpark{0%,100%{transform:translateY(0) scale(.8);opacity:.35}50%{transform:translateY(-16px) scale(1.2);opacity:.9}}
@keyframes popIn{from{transform:translateY(14px) scale(.95);opacity:0}to{transform:none;opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes loaderPulse{0%,100%{transform:scale(1);box-shadow:0 0 0 rgba(168,85,247,0)}50%{transform:scale(1.05);box-shadow:0 0 40px rgba(168,85,247,.3)}}
@keyframes scanGlow{0%,100%{transform:translateY(0);opacity:.7}50%{transform:translateY(-14px);opacity:1}}
@keyframes ravenFly{0%{transform:translateX(0) translateY(18px) scale(.85);opacity:0}12%{opacity:1}100%{transform:translateX(calc(100vw + 110px)) translateY(-22px) scale(1.08);opacity:0}}
@keyframes flyWing{0%,100%{transform:rotate(-18deg)}50%{transform:rotate(20deg)}}
@keyframes flyWingRight{0%,100%{transform:scaleX(-1) rotate(-18deg)}50%{transform:scaleX(-1) rotate(20deg)}}
@keyframes rPop{0%{transform:scale(.3) rotate(-10deg);opacity:0}65%{transform:scale(1.08) rotate(2deg);opacity:1}100%{transform:scale(1) rotate(0)}}
@keyframes splashOut{to{opacity:0;visibility:hidden;pointer-events:none}}
@media(max-height:700px){
  .raven-stage{width:min(28vw,120px)}
  .hero h1{font-size:36px}
  .hero p,.feature-chips{display:none}
  .auth-card{padding:13px}
  .form{gap:8px}
  .input{padding:11px 12px}
  .primary-btn{padding:12px}
  .scan-orbit{width:clamp(118px,20vh,150px);margin-bottom:8px}
  .scan-title{font-size:clamp(38px,8vh,56px)}
  .dashboard-pill{min-height:46px}
}
@media(max-height:600px){.hero .raven-stage,.spark{display:none}.hero h1{font-size:32px}}
@media(min-height:900px){.scan-orbit{width:clamp(180px,26vh,250px)}.scan-title{font-size:clamp(56px,11vh,88px)}}
@media(min-width:760px){.app-shell{max-width:460px;margin:0 auto}.raven-stage{width:220px}}
</style>
</head>
<body>
<div class="intro-splash" id="intro-splash" aria-hidden="true"><div class="intro-r"></div></div>

<!-- ── LOGIN SHELL ── -->
<div class="app-shell">
  <div class="app-shell-inner">
  <header class="topbar">
    <div class="brand">
      <div class="brand-logo-mark"></div>
      <div>
        <div class="brand-name">RAVEN</div>
        <div class="brand-tagline">AI Bill Splitter</div>
      </div>
    </div>
  </header>

  <section class="hero" aria-label="RAVEN app welcome">
    <div class="raven-stage" aria-hidden="true">
      <div class="raven-glow"></div>
      <div class="raven-ring"></div>
      <div class="raven-ring2"></div>
      <div class="spark s1"></div>
      <div class="spark s2"></div>
      <div class="spark s3"></div>
      <div class="raven-wing left"></div>
      <div class="raven-wing right"></div>
      <div class="raven-core"><div class="raven-r">R</div></div>
    </div>
    <h1>Split Smarter</h1>
    <p>Scan any receipt. Split instantly. Get paid faster.</p>
  </section>

  <div class="feature-chips">
    <div class="chip g"><svg viewBox="0 0 24 24"><path d="M3 7h18M8 7V5a2 2 0 0 1 4 0v2"/><rect x="5" y="7" width="14" height="14" rx="2"/></svg>AI Scan</div>
    <div class="chip v"><svg viewBox="0 0 24 24"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/><path d="M21 21v-2a4 4 0 0 0-3-3.87"/></svg>Group Trips</div>
    <div class="chip b"><svg viewBox="0 0 24 24"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4"/></svg>Instant Pay</div>
  </div>

  <main class="auth-card">
    <div class="tabs">
      <button class="tab active" id="login-tab" type="button" onclick="showTab('login')">Sign in</button>
      <button class="tab" id="signup-tab" type="button" onclick="showTab('signup')">Create</button>
    </div>
    <div class="error" id="message-error"></div>
    <div class="success" id="message-success"></div>

    <form class="form active" id="login-form" onsubmit="handleLogin(event)">
      <label class="field">
        <span class="label">Email</span>
        <input class="input" id="login-email" type="email" autocomplete="email" placeholder="you@example.com" required>
      </label>
      <label class="field">
        <span class="label">Password</span>
        <input class="input" id="login-password" type="password" autocomplete="current-password" placeholder="Password" required>
      </label>
      <button class="google-btn" type="button" onclick="handleGoogleAuth()">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="#EA4335" d="M12 10.2v3.9h5.5c-.2 1.3-1.5 3.9-5.5 3.9-3.3 0-6-2.7-6-6s2.7-6 6-6c1.9 0 3.1.8 3.8 1.5l2.6-2.5C16.8 3.5 14.6 2.6 12 2.6 6.9 2.6 2.8 6.7 2.8 11.8s4.1 9.2 9.2 9.2c5.3 0 8.8-3.7 8.8-8.9 0-.6-.1-1.1-.2-1.9H12z"/></svg>
        Continue with Google
      </button>
      <div class="row">
        <label class="tiny"><input id="remember-email" type="checkbox" style="accent-color:var(--green);vertical-align:-2px"> Remember email</label>
        <button class="link-btn" type="button" onclick="showTab('reset')">Forgot?</button>
      </div>
      <button class="primary-btn" id="login-button" type="submit">Sign in to RAVEN</button>
      <button class="secondary-btn" id="resend-confirm-button" type="button" style="display:none" onclick="resendConfirmationEmail()">Resend confirmation email</button>
    </form>

    <form class="form" id="signup-form" onsubmit="handleSignup(event)">
      <label class="field">
        <span class="label">First name</span>
        <input class="input" id="signup-first" type="text" autocomplete="given-name" placeholder="First name" required>
      </label>
      <label class="field">
        <span class="label">Email</span>
        <input class="input" id="signup-email" type="email" autocomplete="email" placeholder="you@example.com" required>
      </label>
      <label class="field">
        <span class="label">Password</span>
        <input class="input" id="signup-password" type="password" autocomplete="new-password" placeholder="At least 6 characters" required>
      </label>
      <button class="primary-btn" id="signup-button" type="submit">Create account</button>
      <p class="tiny">You will finish setup in the app after email confirmation.</p>
    </form>

    <form class="form" id="reset-form" onsubmit="handleReset(event)">
      <label class="field">
        <span class="label">Email</span>
        <input class="input" id="reset-email" type="email" autocomplete="email" placeholder="you@example.com" required>
      </label>
      <button class="primary-btn" id="reset-button" type="submit">Send reset link</button>
      <button class="secondary-btn" type="button" onclick="showTab('login')">Back to sign in</button>
    </form>
    <form class="form" id="new-password-form" onsubmit="handleSetNewPassword(event)" style="display:none">
      <label class="field">
        <span class="label">New Password</span>
        <input class="input" id="new-password-input" type="password" autocomplete="new-password" placeholder="New password (min 6 chars)" required>
      </label>
      <button class="primary-btn" id="new-password-btn" type="submit">Set New Password</button>
    </form>
  </main>
  </div><!-- end app-shell-inner -->
</div>

<section class="app-home" id="app-home" aria-label="RAVEN home">
  <!-- Top bar -->
  <div class="home-top" id="home-top" style="display:none;align-items:center;justify-content:space-between;padding:calc(env(safe-area-inset-top,0px) + 12px) 18px 8px;flex:0 0 auto;position:relative;z-index:4">
    <div class="home-brand">
      <button class="home-logo" id="home-logo-btn" type="button" aria-label="RAVEN — double-tap for settings" style="border:0;padding:0;cursor:pointer;-webkit-tap-highlight-color:transparent;background:transparent;display:grid;place-items:center;position:relative"></button>
      <div>
        <div class="home-title">RAVEN</div>
        <div style="font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.08em">AI Bill Splitter</div>
      </div>
    </div>
    <button id="home-profile-btn" type="button" aria-label="Profile & settings" onclick="openAppPage('settings')"
      style="width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,.16);background:linear-gradient(145deg,rgba(168,85,247,.24),rgba(124,58,237,.14));color:var(--white);font-size:15px;font-weight:800;cursor:pointer;-webkit-tap-highlight-color:transparent;display:grid;place-items:center;font-family:Epilogue,sans-serif;box-shadow:0 8px 20px rgba(0,0,0,.28)">?</button>
  </div>

  <div class="scan-hero">
    <div class="scan-card">
      <div class="scan-orbit">
        <button class="scan-logo-button" type="button" aria-label="Scan receipt" onclick="scanLogoAction()">
          <span class="scan-mark" aria-hidden="true"><span>R</span></span>
        </button>
      </div>
      <h1 class="scan-title">Scan Receipt</h1>
      <p class="scan-instruction">Tap the logo to scan a receipt and split it instantly</p>
      <div class="scan-status-pill" id="scan-status-pill">
        <span class="scan-status-dot"></span>Ready to scan
      </div>
      <div class="app-auth-dock" id="app-auth-dock"></div>
    </div>
  </div>

  <!-- Hidden camera input: triggered directly from scanLogoAction() to satisfy iOS WKWebView policy -->
  <input id="app-camera-input" type="file" accept="image/*" capture="environment" style="position:fixed;left:-9999px;top:-9999px;opacity:0;pointer-events:none" onchange="handleCameraCapture(event)">

  <div class="app-cta-bottom">
    <button class="dashboard-pill" type="button" onclick="goDashboard()">Open Dashboard →</button>
    <div class="auth-actions" style="display:flex" aria-label="Account actions">
      <button class="auth-action" type="button" onclick="showAuthPanel('login')">Sign in</button>
      <button class="auth-action secondary" type="button" onclick="showAuthPanel('signup')">Create account</button>
    </div>
  </div>
</section>

<div id="home-tabs-wrap">
  <nav class="home-tabs" id="home-tabs" aria-label="App navigation">
    <button class="home-tab active" type="button" onclick="showAppHome()">
      <svg viewBox="0 0 24 24"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10.5V20h14v-9.5"/></svg>Home
    </button>
    <button class="home-tab" type="button" onclick="openAppPage('active-bills')">
      <svg viewBox="0 0 24 24"><path d="M7 3h10l2 4v14H5V7l2-4Z"/><path d="M8 11h8M8 15h6"/></svg>Bills
    </button>
    <button class="home-tab" type="button" onclick="openAppPage('trip-hub')">
      <svg viewBox="0 0 24 24"><path d="M4 18 9 5l4 8 7-3-5 9-4-7-7 6Z"/></svg>Trips
    </button>
    <button class="home-tab" type="button" onclick="openAppPage('settings')">
      <svg viewBox="0 0 24 24"><path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"/><path d="M19.4 15a8 8 0 0 0 .1-6l2-1.5-2-3.4-2.4 1a8 8 0 0 0-5.1-3l-.4-2.6H7.6L7.2 2.1a8 8 0 0 0-5.1 3l-2.4-1-2 3.4 2 1.5a8 8 0 0 0 .1 6l-2 1.5 2 3.4 2.4-1a8 8 0 0 0 5 3l.5 2.6h4l.5-2.6a8 8 0 0 0 5-3l2.4 1 2-3.4-2.2-1.5Z"/></svg>More
    </button>
  </nav>
</div>

<div class="loading" id="loading"><div class="loader-mark"><span>R</span></div></div>

<script>
const SUPABASE_URL = 'https://ffjpzkpdumdcwnakpaje.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmanB6a3BkdW1kY3duYWtwYWplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5ODc4OTcsImV4cCI6MjA4ODU2Mzg5N30.JtDLVu4K1TJ8emcN_mvSHBu6e0y8-jPQv-ypoc9p0RU';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let pendingConfirmEmail = '';

function el(id){return document.getElementById(id)}
function getAppAuthRedirectTo(){
  try {
    const origin = window.location.origin || '';
    if (/^https?:\/\//i.test(origin)) return origin + window.location.pathname + '?app=1';
  } catch(e) {}
  // Capacitor uses a capacitor:// or file:// origin — fall back to the web URL for OAuth redirects only
  return 'https://ravensplit.com/app.html?app=1';
}
// Listen for PASSWORD_RECOVERY event from Supabase (email link click)
db.auth.onAuthStateChange((event, session) => {
  if (event === 'PASSWORD_RECOVERY') {
    showSignedOutHome();
    showTab('new-password');
  }
});
function showLoading(show){el('loading').classList.toggle('show', !!show)}
function showMessage(type, text){
  el('message-error').style.display = 'none';
  el('message-success').style.display = 'none';
  const box = el(type === 'success' ? 'message-success' : 'message-error');
  box.textContent = text;
  box.style.display = 'block';
}
function clearMessage(){el('message-error').style.display='none';el('message-success').style.display='none'}
function toggleResendConfirm(show){
  const btn = el('resend-confirm-button');
  if (!btn) return;
  btn.style.display = show ? 'block' : 'none';
}
function showTab(tab){
  clearMessage();
  toggleResendConfirm(false);
  ['login','signup','reset','new-password'].forEach(name => {
    const form = el(name + '-form');
    if (form) form.classList.toggle('active', name === tab);
  });
  el('login-tab').classList.toggle('active', tab === 'login' || tab === 'reset' || tab === 'new-password');
  el('signup-tab').classList.toggle('active', tab === 'signup');
  if (tab === 'reset') {
    const known = el('login-email').value || localStorage.getItem('raven_remembered_email') || '';
    el('reset-email').value = known;
  }
}
function sanitizeRavenBase(base){
  return (String(base || '').trim().split(/\s+/)[0] || '').toLowerCase().replace(/[^a-z0-9_]/g,'').slice(0,16) || 'raven';
}
async function generateUniqueRavenId(base, excludeUserId){
  const clean = sanitizeRavenBase(base);
  for (let i = 0; i < 40; i++) {
    const candidate = (clean + String(Math.floor(Math.random() * 900) + 100)).slice(0,20);
    let query = db.from('profiles').select('id').eq('raven_id', candidate);
    if (excludeUserId) query = query.neq('id', excludeUserId);
    const { data } = await query.maybeSingle();
    if (!data) return candidate;
  }
  return (clean + Date.now().toString().slice(-3)).slice(0,20);
}
async function routeAfterAuth(user){
  showLoading(true);
  try {
    const { data: profile } = await db.from('profiles').select('onboarding_complete,first_name,raven_id,username').eq('id', user.id).maybeSingle();
    if (profile?.onboarding_complete) {
      localStorage.setItem('raven_profile', JSON.stringify({
        user_id: user.id,
        email: user.email,
        first_name: profile.first_name || '',
        raven_id: profile.raven_id || profile.username || '',
        username: profile.username || profile.raven_id || '',
        onboarding_complete: true
      }));
      showLoading(false);
      showAppHome(profile);
      return;
    }
    window.location.href = 'onboarding.html';
  } catch(e) {
    showLoading(false);
    showAppHome();
  }
}
function showAppHome(profile){
  document.querySelector('.app-shell').style.display = 'none';
  el('app-home').classList.add('active');
  el('app-home').classList.remove('signed-out','auth-visible');
  const tabsWrap = el('home-tabs-wrap');
  if (tabsWrap) tabsWrap.style.display = 'block';
  el('home-tabs').classList.add('active');
  const homeTop = el('home-top');
  if (homeTop) homeTop.style.display = 'flex';
  const local = JSON.parse(localStorage.getItem('raven_profile') || '{}');
  const name = profile?.first_name || local.first_name || local.email || '';
  const initial = (name || '?').charAt(0).toUpperCase();
  const profileBtn = el('home-profile');
  if (profileBtn) profileBtn.textContent = initial;
  const profileBtn2 = el('home-profile-btn');
  if (profileBtn2) profileBtn2.textContent = initial;
  // Show the status pill for signed-in users
  const pill = el('scan-status-pill');
  if (pill) pill.style.display = 'none';
}
function showSignedOutHome(){
  const shell = document.querySelector('.app-shell');
  if (shell) shell.style.display = 'none';
  const home = el('app-home');
  home.classList.add('active','signed-out');
  home.classList.remove('auth-visible');
  const homeTop = el('home-top');
  if (homeTop) homeTop.style.display = 'flex';
  const tabsWrap = el('home-tabs-wrap');
  if (tabsWrap) tabsWrap.style.display = 'none';
  el('home-tabs').classList.remove('active');
  // Hide status pill for signed-out users
  const pill = el('scan-status-pill');
  if (pill) pill.style.display = 'none';
  const dock = el('app-auth-dock');
  const card = document.querySelector('.auth-card');
  if (dock && card && card.parentElement !== dock) dock.appendChild(card);
}
function showAuthPanel(tab){
  showSignedOutHome();
  el('app-home').classList.add('auth-visible');
  showTab(tab || 'login');
}
function navigateWithFade(url){
  try { document.body.classList.add('leaving'); } catch(e) {}
  // Small delay so the transition is visible
  setTimeout(() => { window.location.href = url; }, 160);
}
function launchRavenFlight(){
  const layer = document.createElement('div');
  layer.className = 'raven-flight';
  for (let i = 0; i < 7; i++) {
    const bird = document.createElement('div');
    bird.className = 'flight-raven';
    bird.style.setProperty('--fly-y', (20 + i * 9) + 'vh');
    bird.style.animationDelay = (i * 0.035) + 's';
    bird.innerHTML = '<span></span>';
    layer.appendChild(bird);
  }
  document.body.appendChild(layer);
  setTimeout(() => { try { layer.remove(); } catch(e) {} }, 900);
}
function navigateWithRavens(url){
  launchRavenFlight();
  setTimeout(() => navigateWithFade(url), 380);
}
function goDashboard(){
  localStorage.setItem('raven_native_app','1');
  navigateWithRavens('dashboard.html?app=1');
}
function scanLogoAction(){
  if (el('app-home').classList.contains('signed-out')) {
    showAuthPanel('login');
    showMessage('success','Sign in or create an account, then tap the logo to scan.');
    return;
  }
  // Navigate directly to scan — avoids iOS WKWebView file-input crash
  localStorage.setItem('raven_native_app','1');
  navigateWithFade('dashboard.html?app=1&page=create-bill&quickscan=1');
}
function handleCameraCapture(event){
  const file = event.target.files && event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    try {
      sessionStorage.setItem('raven_scan_image', e.target.result);
      sessionStorage.setItem('raven_scan_type', file.type || 'image/jpeg');
    } catch(err) { /* sessionStorage full — dashboard will open picker as fallback */ }
    localStorage.setItem('raven_native_app','1');
    navigateWithFade('dashboard.html?app=1&page=create-bill&quickscan=1');
  };
  reader.onerror = function(){
    localStorage.setItem('raven_native_app','1');
    navigateWithFade('dashboard.html?app=1&page=create-bill');
  };
  reader.readAsDataURL(file);
}
function openAppPage(page, options){
  localStorage.setItem('raven_native_app','1');
  const params = new URLSearchParams();
  params.set('app', '1');
  params.set('page', page);
  if (options && options.quickscan) params.set('quickscan', '1');
  navigateWithFade('dashboard.html?' + params.toString());
}
async function handleGoogleAuth(){
  clearMessage();
  try {
    const redirectTo = getAppAuthRedirectTo();
    const { error } = await db.auth.signInWithOAuth({ provider: 'google', options: { redirectTo } });
    if (error) showMessage('error', error.message);
  } catch(e) {
    showMessage('error', 'Google sign-in failed. Please try email/password.');
  }
}
async function handleLogin(event){
  event.preventDefault();
  clearMessage();
  toggleResendConfirm(false);
  const email = el('login-email').value.trim();
  const password = el('login-password').value;
  const btn = el('login-button');
  btn.disabled = true;
  btn.textContent = 'Signing in...';
  const { data, error } = await db.auth.signInWithPassword({ email, password });
  btn.disabled = false;
  btn.textContent = 'Sign in to RAVEN';
  if (error) {
    const isUnconfirmed = (error.message || '').toLowerCase().includes('confirm');
    if (isUnconfirmed) {
      pendingConfirmEmail = email;
      showMessage('error', 'Please confirm your email first.');
      toggleResendConfirm(true);
      return;
    }
    return showMessage('error', error.message);
  }
  if (el('remember-email').checked) localStorage.setItem('raven_remembered_email', email);
  else localStorage.removeItem('raven_remembered_email');
  if (data?.user) routeAfterAuth(data.user);
}
async function resendConfirmationEmail(){
  clearMessage();
  const email = (pendingConfirmEmail || el('login-email').value || '').trim();
  if (!email) return showMessage('error', 'Enter your email first.');
  const btn = el('resend-confirm-button');
  btn.disabled = true;
  btn.textContent = 'Sending confirmation...';
  const { error } = await db.auth.resend({
    type: 'signup',
    email,
    options: { emailRedirectTo: getAppAuthRedirectTo() }
  });
  btn.disabled = false;
  btn.textContent = 'Resend confirmation email';
  if (error) return showMessage('error', error.message);
  showMessage('success', 'Confirmation email sent. Check your inbox and spam folder.');
}
async function handleSignup(event){
  event.preventDefault();
  clearMessage();
  const first = el('signup-first').value.trim();
  const email = el('signup-email').value.trim();
  const password = el('signup-password').value;
  if (password.length < 6) return showMessage('error','Password must be at least 6 characters.');
  const btn = el('signup-button');
  btn.disabled = true;
  btn.textContent = 'Creating...';
  let ravenId = '';
  try { ravenId = await generateUniqueRavenId(first || 'raven'); } catch(e) {}
  const { data, error } = await db.auth.signUp({
    email,
    password,
    options: {
      emailRedirectTo: getAppAuthRedirectTo(),
      data: { first_name: first, raven_id: ravenId, username: ravenId }
    }
  });
  if (error) {
    btn.disabled = false;
    btn.textContent = 'Create account';
    if ((error.message || '').toLowerCase().includes('registered')) {
      pendingConfirmEmail = email;
      el('login-email').value = email;
      toggleResendConfirm(true);
    }
    return showMessage('error', error.message);
  }
  if (data?.user) {
    try {
      await db.from('profiles').upsert({
        id: data.user.id,
        email,
        first_name: first,
        raven_id: ravenId || await generateUniqueRavenId(first || 'raven', data.user.id),
        username: ravenId,
        onboarding_complete: false,
        updated_at: new Date().toISOString()
      }, { onConflict: 'id' });
    } catch(e) {}
  }
  btn.disabled = false;
  btn.textContent = 'Create account';
  if (data?.session?.user) {
    routeAfterAuth(data.session.user);
    return;
  }
  pendingConfirmEmail = email;
  try {
    await db.auth.resend({
      type: 'signup',
      email,
      options: { emailRedirectTo: getAppAuthRedirectTo() }
    });
  } catch(e) {}
  showTab('login');
  el('login-email').value = email;
  toggleResendConfirm(true);
  showMessage('success','Account created. Check your email to confirm, then sign in here.');
}
async function handleReset(event){
  event.preventDefault();
  clearMessage();
  const email = el('reset-email').value.trim();
  const btn = el('reset-button');
  btn.disabled = true;
  btn.textContent = 'Sending...';
  const redirectTo = getAppAuthRedirectTo();
  const { error } = await db.auth.resetPasswordForEmail(email, { redirectTo });
  btn.disabled = false;
  btn.textContent = 'Send reset link';
  if (error) return showMessage('error', error.message);
  showMessage('success','Reset link sent. Check your inbox.');
}
async function handleSetNewPassword(event){
  event.preventDefault();
  clearMessage();
  const pw = el('new-password-input').value.trim();
  if (!pw || pw.length < 6) return showMessage('error','Password must be at least 6 characters.');
  const btn = el('new-password-btn');
  btn.disabled = true;
  btn.textContent = 'Saving...';
  const { error } = await db.auth.updateUser({ password: pw });
  btn.disabled = false;
  btn.textContent = 'Set New Password';
  if (error) return showMessage('error', error.message);
  showMessage('success','Password updated! Signing you in...');
  setTimeout(() => {
    const { data: { session } } = db.auth.getSession().then(({ data: { session } }) => {
      if (session?.user) routeAfterAuth(session.user);
    });
  }, 1200);
}
// Double-tap the top-left logo to go to Settings (iOS-friendly — dblclick unreliable on mobile)
(function(){
  let lastTap = 0;
  document.addEventListener('DOMContentLoaded', function(){
    const logoBtn = document.getElementById('home-logo-btn');
    if (!logoBtn) return;
    logoBtn.addEventListener('touchend', function(e){
      const now = Date.now();
      if (now - lastTap < 350) {
        e.preventDefault();
        openAppPage('settings');
      }
      lastTap = now;
    }, { passive: false });
    logoBtn.addEventListener('dblclick', function(){ openAppPage('settings'); });
  });
})();

(async function init(){
  localStorage.setItem('raven_native_app','1');
  // Fade-in on initial render
  requestAnimationFrame(() => document.body.classList.add('ready'));
  const remembered = localStorage.getItem('raven_remembered_email') || '';
  if (remembered) {
    el('login-email').value = remembered;
    el('remember-email').checked = true;
  }
  const hash = window.location.hash;
  if (hash && hash.includes('access_token')) {
    try { await db.auth.getSession(); } catch(e) {}
    // Check if this is a password recovery redirect
    if (hash.includes('type=recovery')) {
      history.replaceState(null, '', window.location.pathname);
      // Show new-password form
      showSignedOutHome();
      showTab('new-password');
      return;
    }
    history.replaceState(null, '', window.location.pathname);
  }
  const { data: { session } } = await db.auth.getSession();
  if (session?.user) {
    // If session exists but it's a recovery session, show password form
    const urlHash = window.location.hash || '';
    routeAfterAuth(session.user);
  } else showSignedOutHome();
})();
</script>
