workflows:
  raven-ios:
    name: RAVEN iOS App Store Build
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      groups:
        - raven-ios
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.ravensplit.app
      vars:
        APP_ID: com.ravensplit.app
        APP_NAME: RAVEN
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
      node: 22.11.0
      xcode: latest

    scripts:
      - name: Install Node & npm dependencies
        script: |
          set -e
          echo "PWD: $(pwd)"
          ls -la
          node -v
          npm -v
          cat package.json
          npm install
        working_directory: .

      - name: Stage web assets for Capacitor
        script: |
          set -e
          rm -rf dist
          mkdir -p dist
          rsync -a ./ dist/ \
            --exclude dist \
            --exclude ios \
            --exclude node_modules \
            --exclude .git \
            --exclude codemagic \
            --exclude "package*.json" \
            --exclude "proxy*.js" \
            --exclude "server*.js" \
            --exclude README.md
          ls -la dist
        working_directory: .

      - name: Initialize Capacitor iOS
        script: |
          set -e
          echo "PWD: $(pwd)"
          ls -la
          node -v
          npm -v
          npx cap add ios || true
          npx cap sync ios
        working_directory: .

      - name: Generate iOS app icons
        script: |
          set -e

          ICON_SOURCE="$CM_BUILD_DIR/icon-1024.png"
          ICON_SET="$CM_BUILD_DIR/ios/App/App/Assets.xcassets/AppIcon.appiconset"

          if [ ! -f "$ICON_SOURCE" ]; then
            echo "Missing app icon source: $ICON_SOURCE"
            exit 1
          fi

          mkdir -p "$ICON_SET"

          create_icon() {
            local size="$1"
            local filename="$2"
            sips -z "$size" "$size" "$ICON_SOURCE" --out "$ICON_SET/$filename"
          }

          create_icon 20 AppIcon-20.png
          create_icon 40 AppIcon-20@2x.png
          create_icon 60 AppIcon-20@3x.png
          create_icon 29 AppIcon-29.png
          create_icon 58 AppIcon-29@2x.png
          create_icon 87 AppIcon-29@3x.png
          create_icon 40 AppIcon-40.png
          create_icon 80 AppIcon-40@2x.png
          create_icon 120 AppIcon-40@3x.png
          create_icon 120 AppIcon-60@2x.png
          create_icon 180 AppIcon-60@3x.png
          create_icon 76 AppIcon-76.png
          create_icon 152 AppIcon-76@2x.png
          create_icon 167 AppIcon-83.5@2x.png
          create_icon 1024 AppIcon-1024.png

          cat > "$ICON_SET/Contents.json" <<'JSON'
          {
            "images": [
              { "size": "20x20", "idiom": "iphone", "filename": "AppIcon-20@2x.png", "scale": "2x" },
              { "size": "20x20", "idiom": "iphone", "filename": "AppIcon-20@3x.png", "scale": "3x" },
              { "size": "29x29", "idiom": "iphone", "filename": "AppIcon-29@2x.png", "scale": "2x" },
              { "size": "29x29", "idiom": "iphone", "filename": "AppIcon-29@3x.png", "scale": "3x" },
              { "size": "40x40", "idiom": "iphone", "filename": "AppIcon-40@2x.png", "scale": "2x" },
              { "size": "40x40", "idiom": "iphone", "filename": "AppIcon-40@3x.png", "scale": "3x" },
              { "size": "60x60", "idiom": "iphone", "filename": "AppIcon-60@2x.png", "scale": "2x" },
              { "size": "60x60", "idiom": "iphone", "filename": "AppIcon-60@3x.png", "scale": "3x" },
              { "size": "20x20", "idiom": "ipad", "filename": "AppIcon-20.png", "scale": "1x" },
              { "size": "20x20", "idiom": "ipad", "filename": "AppIcon-20@2x.png", "scale": "2x" },
              { "size": "29x29", "idiom": "ipad", "filename": "AppIcon-29.png", "scale": "1x" },
              { "size": "29x29", "idiom": "ipad", "filename": "AppIcon-29@2x.png", "scale": "2x" },
              { "size": "40x40", "idiom": "ipad", "filename": "AppIcon-40.png", "scale": "1x" },
              { "size": "40x40", "idiom": "ipad", "filename": "AppIcon-40@2x.png", "scale": "2x" },
              { "size": "76x76", "idiom": "ipad", "filename": "AppIcon-76.png", "scale": "1x" },
              { "size": "76x76", "idiom": "ipad", "filename": "AppIcon-76@2x.png", "scale": "2x" },
              { "size": "83.5x83.5", "idiom": "ipad", "filename": "AppIcon-83.5@2x.png", "scale": "2x" },
              { "size": "1024x1024", "idiom": "ios-marketing", "filename": "AppIcon-1024.png", "scale": "1x" }
            ],
            "info": {
              "version": 1,
              "author": "xcode"
            }
          }
          JSON

          ls -la "$ICON_SET"
        working_directory: .

      - name: Install CocoaPods dependencies
        script: |
          set -e
          pod install
          ls -la
        working_directory: ios/App

      - name: Set up code signing settings on Xcode project
        script: |
          set -e
          xcode-project use-profiles --project "$XCODE_PROJECT"
          ls -la /Users/builder
        working_directory: .

      - name: Set app version
        script: |
          set -e

          ASC_LATEST_BUILD=$(app-store-connect get-latest-build-number "$APP_ID" 2>/dev/null || true)
          if ! [[ "$ASC_LATEST_BUILD" =~ ^[0-9]+$ ]]; then
            ASC_LATEST_BUILD=0
          fi

          CI_BUILD_NUMBER="${BUILD_NUMBER:-1}"
          if ! [[ "$CI_BUILD_NUMBER" =~ ^[0-9]+$ ]]; then
            CI_BUILD_NUMBER=1
          fi

          APP_BUILD_NUMBER=$((ASC_LATEST_BUILD + 1))
          if [ "$CI_BUILD_NUMBER" -gt "$APP_BUILD_NUMBER" ]; then
            APP_BUILD_NUMBER="$CI_BUILD_NUMBER"
          fi

          echo "App Store latest build number: $ASC_LATEST_BUILD"
          echo "Codemagic build number: $CI_BUILD_NUMBER"
          echo "Using iOS build number: $APP_BUILD_NUMBER"

          agvtool new-version -all "$APP_BUILD_NUMBER"
          agvtool new-marketing-version 1.0.0
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $APP_BUILD_NUMBER" App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0.0" App/Info.plist
        working_directory: ios/App

      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --export-options-plist /Users/builder/export_options.plist
        working_directory: .

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
