workflows:
  raven-ios:
    name: RAVEN iOS App Store Build
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      groups:
        - raven-ios
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.ravensplit.app
      vars:
        APP_ID: com.ravensplit.app
        APP_NAME: RAVEN
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
      node: 22.11.0
      xcode: latest

    scripts:
      - name: Install Node & npm dependencies
        script: |
          set -e
          echo "PWD: $(pwd)"
          ls -la
          node -v
          npm -v
          cat package.json
          npm install
        working_directory: .

      - name: Stage web assets for Capacitor
        script: |
          set -e
          rm -rf dist
          mkdir -p dist
          rsync -a ./ dist/ \
            --exclude dist \
            --exclude ios \
            --exclude node_modules \
            --exclude .git \
            --exclude codemagic \
            --exclude "package*.json" \
            --exclude "proxy*.js" \
            --exclude "server*.js" \
            --exclude README.md
          ls -la dist
        working_directory: .

      - name: Initialize Capacitor iOS
        script: |
          set -e
          echo "PWD: $(pwd)"
          ls -la
          node -v
          npm -v
          npx cap add ios || true
          npx cap sync ios
        working_directory: .

      - name: Install CocoaPods dependencies
        script: |
          set -e
          pod install
          ls -la
        working_directory: ios/App

      - name: Set up code signing settings on Xcode project
        script: |
          set -e
          xcode-project use-profiles --project "$XCODE_PROJECT"
          ls -la /Users/builder
        working_directory: .

      - name: Set app version
        script: |
          set -e

          ASC_LATEST_BUILD=$(app-store-connect get-latest-build-number "$APP_ID" 2>/dev/null || true)
          if ! [[ "$ASC_LATEST_BUILD" =~ ^[0-9]+$ ]]; then
            ASC_LATEST_BUILD=0
          fi

          CI_BUILD_NUMBER="${BUILD_NUMBER:-1}"
          if ! [[ "$CI_BUILD_NUMBER" =~ ^[0-9]+$ ]]; then
            CI_BUILD_NUMBER=1
          fi

          APP_BUILD_NUMBER=$((ASC_LATEST_BUILD + 1))
          if [ "$CI_BUILD_NUMBER" -gt "$APP_BUILD_NUMBER" ]; then
            APP_BUILD_NUMBER="$CI_BUILD_NUMBER"
          fi

          echo "App Store latest build number: $ASC_LATEST_BUILD"
          echo "Codemagic build number: $CI_BUILD_NUMBER"
          echo "Using iOS build number: $APP_BUILD_NUMBER"

          agvtool new-version -all "$APP_BUILD_NUMBER"
          agvtool new-marketing-version 1.0.0
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $APP_BUILD_NUMBER" App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0.0" App/Info.plist
        working_directory: ios/App

      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --export-options-plist /Users/builder/export_options.plist
        working_directory: .

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
